<!-- OTIMIZAR TODAS AS IMAGENS EM TODAS AS PÁGINAS QUE TÊM IMAGENS PEQUENAS
        EXPOSIÇÃO
        OFICINAS -->

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidade Sensível</title>
    <link rel="stylesheet" href="src/styles/estilos.css">
    <link rel="stylesheet" href="src/styles/pag-ini.css">
</head>

<body>
    <button id="backToTop" aria-label="Voltar ao Topo" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
            class="bi bi-chevron-double-up" viewBox="0 0 16 16">
            <path fill-rule="evenodd"
                d="M7.646 2.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1-.708.708L8 3.707 2.354 9.354a.5.5 0 1 1-.708-.708z" />
            <path fill-rule="evenodd"
                d="M7.646 6.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1-.708.708L8 7.707l-5.646 5.647a.5.5 0 0 1-.708-.708z" />
        </svg>
    </button>

    <div class="container">
        <header>
            <div class="logo">
                <img src="src/img/logo-colorida-cidade-sensivel.png" alt="">
            </div>
        </header>

        <div id="navbar"></div>

        <main>
            <div class="slider">
                <div class="slides">
                    <!-- Radio Buttons -->
                    <input type="radio" name="radio-btn" id="radio1" onclick="resetTimer(1)">
                    <input type="radio" name="radio-btn" id="radio2" onclick="resetTimer(2)">
                    <input type="radio" name="radio-btn" id="radio3" onclick="resetTimer(3)">
                    <input type="radio" name="radio-btn" id="radio4" onclick="resetTimer(4)">
                    <input type="radio" name="radio-btn" id="radio5" onclick="resetTimer(5)">
                    <input type="radio" name="radio-btn" id="radio6" onclick="resetTimer(6)">

                    <!-- Slide images -->
                    <div class="slide first">
                        <a href="index.html"><img src="src/img/carrocel-index/1.webp" alt="Início"></a>
                        <div class="slide-titulo">
                            <h2>Inicio</h2>
                        </div>
                    </div>
                    <div class="slide">
                        <a href="projeto.html"><img src="src/img/carrocel-index/2.webp" alt="Projeto"></a>
                        <div class="slide-titulo">
                            <h2>Projeto</h2>
                        </div>
                    </div>
                    <div class="slide">
                        <a href="oficinas.html"><img src="src/img/carrocel-index/3.webp" alt="Oficinas"></a>
                        <div class="slide-titulo">
                            <h2>Oficina</h2>
                        </div>
                    </div>
                    <div class="slide">
                        <a href="exposicao.html"><img src="src/img/carrocel-index/4.webp" alt="A Exposição"></a>
                        <div class="slide-titulo">
                            <h2>A Exposição</h2>
                        </div>
                    </div>
                    <div class="slide">
                        <a href="intervencao-urbana.html"><img src="src/img/carrocel-index/5.webp" alt="Intervenção Urbana"></a>
                        <div class="slide-titulo">
                            <h2>Intervenção Urbana</h2>
                        </div>
                    </div>
                    <div class="slide">
                        <a href=""><img src="src/img/carrocel-index/6.webp" alt="Clipping"></a>
                        <div class="slide-titulo">
                            <h2>Clipping</h2>
                        </div>
                    </div>

                    <!-- Navigation auto -->
                    <div class="navigation-auto">
                        <div class="auto-btn1"></div>
                        <div class="auto-btn2"></div>
                        <div class="auto-btn3"></div>
                        <div class="auto-btn4"></div>
                        <div class="auto-btn5"></div>
                        <div class="auto-btn6"></div>
                    </div>
                </div>

                <!-- Manual Navigation -->
                <div class="manual-navigation">
                    <label for="radio1" class="manual-btn"></label>
                    <label for="radio2" class="manual-btn"></label>
                    <label for="radio3" class="manual-btn"></label>
                    <label for="radio4" class="manual-btn"></label>
                    <label for="radio5" class="manual-btn"></label>
                    <label for="radio6" class="manual-btn"></label>
                </div>

            </div>
        </main>

        <footer>
            <!-- Instagram link -->
            <a href="https://www.instagram.com/" target="_blank">
                <img src="src/img/insta.png">
                <p>Instagram</p>
            </a>
        </footer>

    </div>

    <div id="rodape-holder"></div>

    <script src="src/scripts/script-pag-ini.js"></script>
    <script src="src/scripts/load-components.js"></script>
    <script src="src/scripts/navbar.js"></script>
    <script src="src/scripts/back-to-top.js"></script>
</body>

</html>
